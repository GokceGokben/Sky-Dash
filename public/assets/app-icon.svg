<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Sky Dash App Icon</title>
  <desc id="desc">Rounded square sky background with a pixel-style bee flying between pink pipes.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92D6FF"/>
      <stop offset="100%" stop-color="#5EB2F7"/>
    </linearGradient>
    <linearGradient id="pipePink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF77B8"/>
      <stop offset="100%" stop-color="#FF4EA2"/>
    </linearGradient>
    <linearGradient id="beeYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE37B"/>
      <stop offset="100%" stop-color="#FFC735"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1B3A62" flood-opacity="0.25"/>
    </filter>
    <clipPath id="roundClip">
      <rect x="32" y="32" width="960" height="960" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <rect x="32" y="32" width="960" height="960" rx="224" ry="224" fill="url(#sky)"/>

  <g clip-path="url(#roundClip)">
    <circle cx="820" cy="170" r="82" fill="#FFFFFF" opacity="0.26"/>

    <g opacity="0.9">
      <rect x="110" y="200" width="90" height="52" rx="20" fill="#FFFFFF"/>
      <rect x="166" y="176" width="96" height="60" rx="22" fill="#FFFFFF"/>
      <rect x="235" y="200" width="80" height="48" rx="20" fill="#FFFFFF"/>
    </g>

    <g opacity="0.75">
      <rect x="680" y="290" width="72" height="40" rx="16" fill="#FFFFFF"/>
      <rect x="728" y="272" width="80" height="48" rx="18" fill="#FFFFFF"/>
      <rect x="786" y="290" width="68" height="40" rx="16" fill="#FFFFFF"/>
    </g>

    <g filter="url(#softShadow)">
      <rect x="760" y="-80" width="170" height="430" rx="18" fill="url(#pipePink)"/>
      <rect x="734" y="286" width="222" height="72" rx="16" fill="#FF6CB3"/>

      <rect x="120" y="640" width="170" height="470" rx="18" fill="url(#pipePink)"/>
